spring:
  application:
    name: daedalus-server
  profiles:
    active: ${DAEDALUS_PROFILE:dev}
  banner:
    location: classpath:banner.txt

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.daedalus: INFO
    org.springframework: INFO

# Daedalus-specific config. Bind these with @ConfigurationProperties("daedalus") in the server module.
daedalus:
  plugins:
    directory: ${DAEDALUS_PLUGIN_DIR:${user.home}/.daedalus/plugins}
    scan-on-startup: true
  cache:
    maze-cache-size: 256
    maze-cache-ttl-minutes: 30
  security:
    # JWT signing key. Required in every profile because AuthController is registered
    # everywhere (so dev and desktop builds can issue tokens for testing too). The default
    # below is for dev / test only — prod must override via DAEDALUS_JWT_SECRET. The value
    # is base64-decoded; a literal string >= 32 chars also works (UTF-8 fallback).
    jwt:
      secret: ${DAEDALUS_JWT_SECRET:dev-only-secret-change-me-please-32bytes!}
      issuer: ${DAEDALUS_JWT_ISSUER:daedalus-server}
      ttl-minutes: ${DAEDALUS_JWT_TTL_MINUTES:60}
    # Single ops user. Password is a bcrypt hash, never plaintext. Generate with:
    #   System.out.println(new BCryptPasswordEncoder().encode("your-password"));
    # In dev, the default below is the bcrypt of "admin" so login works out of the box.
    # In prod, override DAEDALUS_ADMIN_PASSWORD_BCRYPT or auth will refuse all attempts.
    admin:
      username: ${DAEDALUS_ADMIN_USER:admin}
      password-bcrypt: ${DAEDALUS_ADMIN_PASSWORD_BCRYPT:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}
  # ----- Per-key rate limiting -----
  # The Resilience4j instances below are treated as *templates*: PerKeyRateLimitInterceptor
  # clones each into an independent bucket per caller (authenticated subject, else client IP),
  # so one noisy client can't spend everyone else's quota.
  ratelimit:
    # Trust X-Forwarded-For when deriving the client IP? Enable ONLY behind a proxy / load
    # balancer that overwrites the header — otherwise a caller can spoof it to mint a fresh
    # bucket per forged IP and defeat the limit. Off by default (use the socket remoteAddr);
    # application-prod.yml turns it on because that surface sits behind an ingress.
    trust-forwarded-header: ${DAEDALUS_RL_TRUST_XFF:false}

# ----- Resilience4j rate limiters -----
# These named instances are the per-caller *templates* consulted by @PerKeyRateLimit(...) on
# the controller methods (mazeGenerate / mazeSolve / authLogin). The interceptor clones each
# into a bucket keyed on the caller (see daedalus.ratelimit above); the values here set the
# limit / refresh-period / timeout of every such bucket. Defaults below are sane for a
# single-process dev / portfolio deploy. Profile-specific overrides:
#   application-test.yml  -> very generous (don't trip MockMvc tests)
#   application-prod.yml  -> tighter (real traffic, brute-force protection on /auth/login)
resilience4j:
  ratelimiter:
    instances:
      mazeGenerate:
        limit-for-period: 30          # 30 generations
        limit-refresh-period: 1m      # per minute
        timeout-duration: 0           # don't queue — fail fast with RequestNotPermitted
        register-health-indicator: false
      mazeSolve:
        limit-for-period: 60          # solving is cheaper than generating; allow more headroom
        limit-refresh-period: 1m
        timeout-duration: 0
        register-health-indicator: false
      authLogin:
        limit-for-period: 10          # brute-force guard. Tighten in prod.
        limit-refresh-period: 1m
        timeout-duration: 0
        register-health-indicator: false
