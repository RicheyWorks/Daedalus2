# SPDX-License-Identifier: MIT
#
# Continuous integration for Daedalus.
#
# Runs the full Maven reactor (`mvn -B install`) on every push / PR against
# main, then builds the reference biome-plugin so the worked example doesn't
# silently rot.
#
# The reference plugin builds AFTER the reactor on purpose — its pom resolves
# daedalus-plugin-api from the local Maven repo (~/.m2), which only the
# `install` phase populates. (`verify` runs all tests but installs nothing,
# which is why the reactor step must run `install`, not `verify`.)

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-flight runs on the same ref when a new push lands — saves CI
# minutes on rapid pushes / rebases.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# contents: write is needed only by the coverage-badge commit step on main.
permissions:
  contents: write

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          # setup-java's built-in cache covers ~/.m2/repository keyed on the
          # pom set — equivalent to a manual actions/cache step but maintained
          # upstream.
          cache: maven

      # Force English locale + UTC so any test that asserts on formatted text
      # or timestamps behaves identically on every runner. Cheap insurance.
      - name: Set deterministic locale
        run: |
          echo "LANG=en_US.UTF-8"  >> "$GITHUB_ENV"
          echo "LC_ALL=en_US.UTF-8" >> "$GITHUB_ENV"
          echo "TZ=UTC"             >> "$GITHUB_ENV"

      - name: Build & test the reactor
        run: mvn -B -ntp clean install

      - name: Build the reference biome-plugin
        # Runs after the reactor so daedalus-plugin-api is in ~/.m2. Tests in
        # the example pom run via the default surefire binding.
        run: mvn -B -ntp -f examples/biome-plugin/pom.xml clean package

      # Coverage badge: only on pushes to main (not PRs — no commit rights
      # there, and the badge should reflect main anyway).
      - name: Collect JaCoCo reports
  