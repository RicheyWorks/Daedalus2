name: Feature request
description: Propose a new generator, solver, API surface, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Sketch how it could work. API shape, algorithm, module it belongs in.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Core engine (generators / solvers)
        - Plugin SPI
        - Server / REST API
        - Desktop UI
        - Build / infrastructure
        - Other
